<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<header>
    <h1>Web Dev | HTML Form - User Poll</h1>
</header>

<body>
    <form>
        <fieldset>
            <legend>Contact Information</legend>
            <div class="form-item column2">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Full Name" required>
            </div>
            <div class="form-item column2">
                <label for="email">Email:</label>
                <input type="email" id="useremail" name="useremail"
                  placeholder="idkyouremail@gmail.com" required>
            </div>
        </fieldset>
        <fieldset>
            <legend>Questions</legend>
            <div class="form-item">
                <label for="browser">What is your favorite web browser?</label>
                <select name="browser" id="browser">
                    <option value="1">Chrome</option>
                    <option value="2">Safari</option>
                    <option value="3">Edge</option>
                    <option value="4">Brave</option>
                    <option value="5">Other</option>
                </select>
            </div>
            <div class="form-item">
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" name="pet" id="pet">
            </div>
            <div class="form-item">
                <label for="feedback">List the places you have lived.</label>
                <textarea name="feedback" id="feedback" rows="3"
                  placeholder="Rome, Brazil, Rondonia, Paris..."></textarea>
            </div>
        </fieldset>
        <button type="submit">Submit Poll</button>
    </form>
</body>
<footer>
    <p>&copy;2026 | HTML Form - User Poll Activity</p>
</footer>

</html>
